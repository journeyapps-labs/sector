name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '15 * * * *'
  pull_request_target:
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    name: Run Renovate
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Renovate
        uses: renovatebot/github-action@v43.0.12
        env:
          LOG_LEVEL: info
          RENOVATE_CONFIG_FILE: .github/renovate.json
          RENOVATE_REPOSITORIES: ${{ github.repository }}
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  dependency-changeset:
    name: Create changeset for dependency PRs
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        contains(github.event.pull_request.labels.*.name, 'dependencies') ||
        startsWith(github.event.pull_request.head.ref, 'renovate/')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Add dependency changeset
        uses: mscharley/dependency-changesets-action@v1.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          use-conventional-commits: false
          author-name: renovate[bot]
          author-email: 29139614+renovate[bot]@users.noreply.github.com
